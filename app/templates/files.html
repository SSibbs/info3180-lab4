{% extends 'base.html' %}

{% block main %}
<h1 class="page-header">Uploaded Images</h1>

<div class="image-grid">
    {% for img in images %}
    <div class="image-item">
        <img src="{{ url_for('get_image', filename=img) }}" alt="{{ img }}">
    </div>
    {% endfor %}
</div>

<style>
/* Simple 3-column grid */
.image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.image-item img {
    width: 100%;
    height: auto;
    border-radius: 5px;
}



.image-item p {
    text-align: center;
    font-size: 0.9em;
}
@media (max-width: 768px) {
    .image-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
@media (max-width: 480px) {
    .image-grid {
        grid-template-columns: 1fr;
    }
}

</style>
{% endblock %}
